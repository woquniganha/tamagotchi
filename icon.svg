<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A29BFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eggGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE4C4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- 蛋的身体 -->
  <g filter="url(#shadow)">
    <ellipse cx="256" cy="280" rx="140" ry="170" fill="url(#eggGrad)"/>

    <!-- 顶部裂纹 -->
    <path d="M180 140 Q200 120 220 135 Q240 150 260 130 Q280 110 300 125 Q320 140 340 130"
          stroke="#E8C4A0" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- 小恐龙探出头 -->
    <!-- 头部 -->
    <ellipse cx="256" cy="160" rx="75" ry="65" fill="#7ED6A5"/>
    <!-- 眼睛 -->
    <ellipse cx="230" cy="155" rx="12" ry="14" fill="white"/>
    <ellipse cx="282" cy="155" rx="12" ry="14" fill="white"/>
    <circle cx="233" cy="157" r="6" fill="#333"/>
    <circle cx="285" cy="157" r="6" fill="#333"/>
    <circle cx="235" cy="154" r="2" fill="white"/>
    <circle cx="287" cy="154" r="2" fill="white"/>
    <!-- 腮红 -->
    <ellipse cx="205" cy="175" rx="12" ry="8" fill="#FFB6C1" opacity="0.6"/>
    <ellipse cx="307" cy="175" rx="12" ry="8" fill="#FFB6C1" opacity="0.6"/>
    <!-- 嘴巴 -->
    <path d="M240 185 Q256 200 272 185" stroke="#5A9E7A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- 小角 -->
    <path d="M210 105 L205 85 L220 100 Z" fill="#5A9E7A"/>
    <path d="M302 105 L307 85 L292 100 Z" fill="#5A9E7A"/>
  </g>

  <!-- 底部小星星装饰 -->
  <text x="120" y="400" font-size="28" opacity="0.5">✨</text>
  <text x="360" y="410" font-size="24" opacity="0.5">⭐</text>
  <text x="90" y="330" font-size="20" opacity="0.4">✨</text>
  <text x="390" y="340" font-size="18" opacity="0.4">✨</text>
</svg>
